<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mission Control — Live Agent Activity</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #02050d;
    --bg-floor: #050a18;
    --neon-green: #00ff88;
    --neon-cyan: #00d9ff;
    --neon-pink: #ff2e88;
    --neon-amber: #ffcc00;
    --neon-purple: #b266ff;
    --text: #c8d8e8;
    --text-dim: #5a7090;
    --text-bright: #ffffff;
    --alert-red: #ff3355;
    --border: rgba(0, 217, 255, 0.2);
    --border-strong: rgba(0, 217, 255, 0.4);
  }

  html, body { height: 100%; width: 100%; overflow: hidden; }
  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'SF Mono', 'Consolas', 'Monaco', 'Menlo', 'Courier New', monospace;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 25% 20%, rgba(0, 80, 180, 0.18), transparent 60%),
      radial-gradient(ellipse 50% 60% at 75% 80%, rgba(120, 0, 200, 0.12), transparent 60%),
      radial-gradient(circle at center, var(--bg-floor), var(--bg-deep) 75%);
    pointer-events: none;
    z-index: 0;
  }

  .mission-control {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    z-index: 1;
  }

  /* ============ HEADER ============ */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    background: linear-gradient(180deg, rgba(0, 30, 60, 0.7), rgba(0, 15, 30, 0.4));
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
    gap: 10px;
    flex-wrap: wrap;
  }
  .header::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
    animation: scan-h 4s linear infinite;
  }
  @keyframes scan-h {
    0% { top: 0; opacity: 0; }
    50% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  .header-title { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 38px; height: 38px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    background: radial-gradient(circle, rgba(0, 217, 255, 0.3), transparent);
    border: 1px solid var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0, 217, 255, 0.4), inset 0 0 12px rgba(0, 217, 255, 0.2);
  }
  .logo::before {
    content: '◉';
    font-size: 20px;
    color: var(--neon-cyan);
    animation: pulse-glow 2s ease-in-out infinite;
    filter: drop-shadow(0 0 4px var(--neon-cyan));
  }
  .logo::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 10px;
    border: 1px solid rgba(0, 217, 255, 0.3);
    animation: ring-spin 6s linear infinite;
    border-top-color: var(--neon-cyan);
    border-right-color: transparent;
  }
  @keyframes ring-spin { to { transform: rotate(360deg); } }
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.6; transform: scale(0.95); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  .title-text h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text-bright);
    text-transform: uppercase;
  }
  .title-text .sub {
    font-size: 10px;
    color: var(--neon-cyan);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .header-stats { display: flex; gap: 14px; flex-wrap: wrap; }
  .stat-chip {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(0, 217, 255, 0.04);
    min-width: 70px;
  }
  .stat-chip .lbl {
    font-size: 8px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .stat-chip .val {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-bright);
    font-variant-numeric: tabular-nums;
  }
  .stat-chip.green .val { color: var(--neon-green); }
  .stat-chip.cyan .val { color: var(--neon-cyan); }
  .stat-chip.amber .val { color: var(--neon-amber); }
  .stat-chip.pink .val { color: var(--neon-pink); }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .clock {
    font-size: 12px;
    color: var(--neon-green);
    font-variant-numeric: tabular-nums;
    padding: 4px 10px;
    border: 1px solid rgba(0, 255, 136, 0.3);
    border-radius: 6px;
    background: rgba(0, 255, 136, 0.05);
    text-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
  }

  .btn {
    background: rgba(0, 217, 255, 0.1);
    border: 1px solid var(--border-strong);
    color: var(--neon-cyan);
    padding: 7px 12px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn:hover {
    background: rgba(0, 217, 255, 0.2);
    box-shadow: 0 0 16px rgba(0, 217, 255, 0.4);
    transform: translateY(-1px);
  }
  .btn:active { transform: translateY(0); }
  .btn.primary {
    background: linear-gradient(135deg, rgba(0, 255, 136, 0.25), rgba(0, 217, 255, 0.25));
    border-color: var(--neon-green);
    color: var(--neon-green);
    box-shadow: 0 0 12px rgba(0, 255, 136, 0.3);
  }
  .btn.primary:hover {
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
  }
  .btn.alert {
    background: rgba(255, 51, 85, 0.15);
    border-color: var(--alert-red);
    color: var(--alert-red);
  }
  .btn.alert:hover {
    background: rgba(255, 51, 85, 0.3);
    box-shadow: 0 0 16px rgba(255, 51, 85, 0.5);
  }

  /* ============ MAIN LAYOUT ============ */
  .main {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 12px;
    padding: 12px;
    overflow: hidden;
    min-height: 0;
  }

  /* ============ OPERATIONS FLOOR ============ */
  .floor-wrap {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg-floor);
    box-shadow: inset 0 0 80px rgba(0, 217, 255, 0.05), 0 0 30px rgba(0, 0, 0, 0.4);
  }

  .floor {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  /* Grid background */
  .floor::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px),
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 30px 30px, 30px 30px, 150px 150px, 150px 150px;
    animation: grid-pan 30s linear infinite;
  }
  @keyframes grid-pan {
    to { background-position: 30px 30px, 30px 30px, 150px 150px, 150px 150px; }
  }

  /* Scanning sweep */
  .radar-sweep {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
  }
  .radar-sweep::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 200%;
    height: 200%;
    transform: translate(-50%, -50%);
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      rgba(0, 217, 255, 0.06) 30deg,
      transparent 60deg,
      transparent 360deg
    );
    animation: radar-spin 8s linear infinite;
  }
  @keyframes radar-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

  /* Zones */
  .zones {
    position: absolute;
    inset: 0;
    z-index: 2;
  }
  .zone {
    position: absolute;
    border: 1px dashed rgba(0, 217, 255, 0.25);
    border-radius: 12px;
    background: rgba(0, 30, 60, 0.25);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    transition: all 0.3s;
    cursor: pointer;
  }
  .zone::before {
    content: attr(data-label);
    position: absolute;
    top: 6px; left: 8px;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--neon-cyan);
    text-transform: uppercase;
    opacity: 0.7;
    pointer-events: none;
  }
  .zone:hover {
    background: rgba(0, 217, 255, 0.06);
    border-color: rgba(0, 217, 255, 0.5);
    box-shadow: 0 0 30px rgba(0, 217, 255, 0.15);
  }

  .zone-intake { top: 6%; left: 4%; width: 22%; height: 26%; border-color: rgba(0, 255, 136, 0.3); }
  .zone-intake::before { color: var(--neon-green); }
  .zone-router { top: 38%; left: 32%; width: 20%; height: 22%; }
  .zone-processor-1 { top: 6%; left: 32%; width: 20%; height: 22%; border-color: rgba(178, 102, 255, 0.3); }
  .zone-processor-1::before { color: var(--neon-purple); }
  .zone-processor-2 { top: 6%; right: 4%; width: 22%; height: 22%; border-color: rgba(255, 46, 136, 0.3); }
  .zone-processor-2::before { color: var(--neon-pink); }
  .zone-processor-3 { top: 38%; right: 4%; width: 22%; height: 22%; border-color: rgba(255, 204, 0, 0.3); }
  .zone-processor-3::before { color: var(--neon-amber); }
  .zone-archive { bottom: 6%; right: 4%; width: 22%; height: 26%; border-color: rgba(0, 217, 255, 0.3); }
  .zone-review { bottom: 6%; left: 32%; width: 20%; height: 26%; }
  .zone-launch { bottom: 6%; left: 4%; width: 22%; height: 26%; border-color: rgba(0, 255, 136, 0.3); }
  .zone-launch::before { color: var(--neon-green); }

  /* Stations within zones */
  .station {
    position: absolute;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(0, 217, 255, 0.4), rgba(0, 50, 100, 0.3));
    border: 2px solid var(--neon-cyan);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 16px rgba(0, 217, 255, 0.4), inset 0 0 12px rgba(0, 217, 255, 0.2);
    z-index: 3;
  }
  .station:hover {
    transform: scale(1.15);
    box-shadow: 0 0 28px rgba(0, 217, 255, 0.7), inset 0 0 16px rgba(0, 217, 255, 0.4);
  }
  .station.busy {
    border-color: var(--neon-amber);
    box-shadow: 0 0 16px rgba(255, 204, 0, 0.5), inset 0 0 12px rgba(255, 204, 0, 0.3);
    animation: busy-pulse 1.2s ease-in-out infinite;
  }
  @keyframes busy-pulse {
    0%, 100% { box-shadow: 0 0 16px rgba(255, 204, 0, 0.5), inset 0 0 12px rgba(255, 204, 0, 0.3); }
    50% { box-shadow: 0 0 28px rgba(255, 204, 0, 0.8), inset 0 0 16px rgba(255, 204, 0, 0.5); }
  }
  .station.idle {
    border-color: var(--text-dim);
    background: radial-gradient(circle at 30% 30%, rgba(90, 112, 144, 0.3), rgba(30, 40, 60, 0.3));
    box-shadow: 0 0 8px rgba(90, 112, 144, 0.3);
  }
  .station.processing {
    border-color: var(--neon-purple);
    box-shadow: 0 0 16px rgba(178, 102, 255, 0.5), inset 0 0 12px rgba(178, 102, 255, 0.3);
    animation: spin-process 3s linear infinite;
  }
  @keyframes spin-process { to { transform: rotate(360deg); } }
  .station.online {
    border-color: var(--neon-green);
    box-shadow: 0 0 16px rgba(0, 255, 136, 0.5), inset 0 0 12px rgba(0, 255, 136, 0.3);
  }
  .station.away {
    border-color: rgba(255, 51, 85, 0.6);
    background: radial-gradient(circle at 30% 30%, rgba(255, 51, 85, 0.2), rgba(60, 20, 30, 0.3));
  }

  .station::after {
    content: '';
    position: absolute;
    bottom: -3px; right: -3px;
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid var(--bg-floor);
  }
  .station.online::after { background: var(--neon-green); box-shadow: 0 0 6px var(--neon-green); }
  .station.busy::after { background: var(--neon-amber); box-shadow: 0 0 6px var(--neon-amber); }
  .station.idle::after { background: var(--text-dim); }
  .station.processing::after { background: var(--neon-purple); box-shadow: 0 0 6px var(--neon-purple); }
  .station.away::after { background: var(--alert-red); }

  .station .ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid currentColor;
    opacity: 0;
    pointer-events: none;
  }
  .station.busy .ring {
    opacity: 0.6;
    animation: ring-out 1.5s ease-out infinite;
  }
  @keyframes ring-out {
    0% { transform: scale(0.8); opacity: 0.7; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  /* Connecting paths */
  .paths {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .path-line {
    stroke-dasharray: 4 4;
    animation: dash-flow 1s linear infinite;
    opacity: 0.4;
  }
  @keyframes dash-flow {
    to { stroke-dashoffset: -16; }
  }

  /* Task packets (drones) */
  .packet {
    position: absolute;
    width: 14px; height: 14px;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
  }
  .packet-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--neon-cyan), rgba(0, 217, 255, 0.3));
    box-shadow: 0 0 12px var(--neon-cyan), 0 0 4px var(--neon-cyan);
    position: relative;
  }
  .packet-inner::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid var(--neon-cyan);
    opacity: 0.5;
    animation: packet-pulse 0.8s ease-out infinite;
  }
  @keyframes packet-pulse {
    0% { transform: scale(0.6); opacity: 0.8; }
    100% { transform: scale(2); opacity: 0; }
  }
  .packet.urgent .packet-inner {
    background: radial-gradient(circle, var(--neon-pink), rgba(255, 46, 136, 0.3));
    box-shadow: 0 0 12px var(--neon-pink), 0 0 4px var(--neon-pink);
  }
  .packet.urgent .packet-inner::before { border-color: var(--neon-pink); }
  .packet.priority .packet-inner {
    background: radial-gradient(circle, var(--neon-amber), rgba(255, 204, 0, 0.3));
    box-shadow: 0 0 12px var(--neon-amber), 0 0 4px var(--neon-amber);
  }
  .packet.priority .packet-inner::before { border-color: var(--neon-amber); }

  .packet-trail {
    position: absolute;
    top: 50%; left: 50%;
    width: 2px; height: 2px;
    background: var(--neon-cyan);
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 4px var(--neon-cyan);
    z-index: 4;
    opacity: 0.6;
  }

  /* ============ SIDE PANEL ============ */
  .side-panel {
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 10px;
    min-height: 0;
  }

  .panel {
    background: linear-gradient(180deg, rgba(0, 20, 40, 0.7), rgba(0, 10, 25, 0.5));
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .panel-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .panel-title h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--neon-cyan);
  }
  .panel-title .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--neon-green);
    box-shadow: 0 0 8px var(--neon-green);
    animation: pulse-glow 1.5s ease-in-out infinite;
  }

  /* Agent list */
  .agent-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-right: 4px;
  }
  .agent-list::-webkit-scrollbar { width: 4px; }
  .agent-list::-webkit-scrollbar-track { background: rgba(0, 217, 255, 0.05); }
  .agent-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

  .agent-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border: 1px solid rgba(0, 217, 255, 0.1);
    border-radius: 6px;
    background: rgba(0, 30, 60, 0.3);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .agent-row:hover {
    background: rgba(0, 217, 255, 0.1);
    border-color: var(--border-strong);
    transform: translateX(2px);
  }
  .agent-avatar {
    font-size: 18px;
    width: 28px; height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(0, 217, 255, 0.1);
    border: 1px solid var(--border);
  }
  .agent-info { flex: 1; min-width: 0; }
  .agent-name { color: var(--text-bright); font-weight: 600; font-size: 11px; }
  .agent-task {
    color: var(--text-dim);
    font-size: 9px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .agent-status {
    font-size: 8px;
    text-transform: uppercase;
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 0.08em;
    font-weight: 700;
  }
  .agent-status.online { background: rgba(0, 255, 136, 0.2); color: var(--neon-green); }
  .agent-status.busy { background: rgba(255, 204, 0, 0.2); color: var(--neon-amber); }
  .agent-status.idle { background: rgba(90, 112, 144, 0.3); color: var(--text-dim); }
  .agent-status.away { background: rgba(255, 51, 85, 0.2); color: var(--alert-red); }

  /* ============ FOOTER LOG ============ */
  .footer-log {
    padding: 0;
    background: linear-gradient(180deg, rgba(0, 15, 30, 0.4), rgba(0, 30, 60, 0.7));
    border-top: 1px solid var(--border);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    max-height: 180px;
    display: flex;
    flex-direction: column;
  }
  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(0, 217, 255, 0.04);
  }
  .log-header h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--neon-cyan);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .log-header .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--neon-green);
    box-shadow: 0 0 8px var(--neon-green);
    animation: pulse-glow 1.5s ease-in-out infinite;
  }
  .log-stream {
    flex: 1;
    overflow-y: auto;
    padding: 6px 18px;
    font-size: 10px;
    line-height: 1.6;
    font-family: inherit;
  }
  .log-stream::-webkit-scrollbar { width: 4px; }
  .log-stream::-webkit-scrollbar-track { background: transparent; }
  .log-stream::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

  .log-entry {
    display: flex;
    gap: 10px;
    padding: 2px 0;
    animation: log-in 0.3s ease-out;
  }
  @keyframes log-in {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .log-time {
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .log-tag {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .log-tag.intake { background: rgba(0, 255, 136, 0.2); color: var(--neon-green); }
  .log-tag.route { background: rgba(0, 217, 255, 0.2); color: var(--neon-cyan); }
  .log-tag.process { background: rgba(178, 102, 255, 0.2); color: var(--neon-purple); }
  .log-tag.archive { background: rgba(90, 112, 144, 0.3); color: var(--text-dim); }
  .log-tag.review { background: rgba(255, 204, 0, 0.2); color: var(--neon-amber); }
  .log-tag.launch { background: rgba(0, 255, 136, 0.2); color: var(--neon-green); }
  .log-tag.error { background: rgba(255, 51, 85, 0.2); color: var(--alert-red); }
  .log-msg { flex: 1; color: var(--text); }
  .log-msg .ref { color: var(--neon-cyan); font-weight: 600; }

  /* ============ TOOLTIP ============ */
  .tooltip {
    position: absolute;
    background: linear-gradient(135deg, rgba(0, 20, 40, 0.95), rgba(0, 10, 25, 0.95));
    border: 1px solid var(--neon-cyan);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 10px;
    color: var(--text);
    pointer-events: none;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 24px rgba(0, 217, 255, 0.3);
    min-width: 200px;
    max-width: 280px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
  }
  .tooltip.show {
    opacity: 1;
    transform: translateY(0);
  }
  .tooltip-title {
    color: var(--neon-cyan);
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tooltip-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    border-bottom: 1px dashed rgba(0, 217, 255, 0.15);
  }
  .tooltip-row:last-child { border-bottom: none; }
  .tooltip-row .lbl { color: var(--text-dim); }
  .tooltip-row .val { color: var(--text-bright); font-weight: 600; }
  .tooltip-section {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  .tooltip-section-title {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .tooltip-task {
    font-size: 9px;
    padding: 2px 0;
    color: var(--text);
    display: flex;
    justify-content: space-between;
  }
  .tooltip-task .tid { color: var(--neon-cyan); }

  /* ============ MODE TOGGLE ============ */
  body.day-mode {
    --bg-deep: #e8eef5;
    --bg-floor: #d4dde8;
    --text: #2a3a4a;
    --text-dim: #8090a0;
    --text-bright: #0a1520;
    --border: rgba(0, 100, 200, 0.2);
    --border-strong: rgba(0, 100, 200, 0.4);
  }
  body.day-mode .floor::before {
    background-image:
      linear-gradient(rgba(0, 100, 200, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 100, 200, 0.06) 1px, transparent 1px),
      linear-gradient(rgba(0, 100, 200, 0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 100, 200, 0.12) 1px, transparent 1px);
  }
  body.day-mode .header {
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(220, 230, 240, 0.7));
  }
  body.day-mode .panel,
  body.day-mode .footer-log {
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(220, 230, 240, 0.7));
  }
  body.day-mode .stat-chip { background: rgba(0, 100, 200, 0.06); }
  body.day-mode .btn { background: rgba(0, 100, 200, 0.1); border-color: rgba(0, 100, 200, 0.4); color: #0066cc; }
  body.day-mode .agent-row { background: rgba(220, 230, 240, 0.6); border-color: rgba(0, 100, 200, 0.2); }
  body.day-mode .zone { background: rgba(255, 255, 255, 0.4); }
  body.day-mode body::before {
    background:
      radial-gradient(ellipse 60% 50% at 25% 20%, rgba(0, 80, 180, 0.08), transparent 60%),
      radial-gradient(ellipse 50% 60% at 75% 80%, rgba(120, 0, 200, 0.06), transparent 60%);
  }

  /* Emergency mode */
  body.emergency {
    --neon-cyan: #ff3355;
    --neon-green: #ffcc00;
  }
  body.emergency .header {
    background: linear-gradient(180deg, rgba(80, 0, 20, 0.7), rgba(40, 0, 10, 0.4));
    border-bottom-color: var(--alert-red);
    animation: alert-flash 1.5s ease-in-out infinite;
  }
  @keyframes alert-flash {
    0%, 100% { box-shadow: 0 0 0 transparent; }
    50% { box-shadow: inset 0 -2px 20px rgba(255, 51, 85, 0.5); }
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 900px) {
    .main {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto;
    }
    .side-panel { grid-template-rows: auto; }
    .agent-list { max-height: 130px; }
    .header { padding: 8px 12px; }
    .header-stats { gap: 8px; }
    .stat-chip { min-width: 56px; padding: 3px 7px; }
    .stat-chip .val { font-size: 11px; }
    .title-text h1 { font-size: 12px; }
    .title-text .sub { font-size: 8px; }
    .footer-log { max-height: 140px; }
    .btn { padding: 6px 10px; font-size: 9px; }
  }

  @media (max-width: 600px) {
    .header { flex-direction: column; align-items: stretch; }
    .header-actions { justify-content: space-between; }
    .footer-log .log-stream { font-size: 9px; }
    .zone { font-size: 8px; }
    .station { width: 44px; height: 44px; font-size: 18px; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .radar-sweep::before,
    .floor::before { display: none; }
  }
</style>
</head>
<body>
<div class="mission-control">

  <!-- HEADER -->
  <header class="header">
    <div class="header-title">
      <div class="logo" aria-hidden="true"></div>
      <div class="title-text">
        <h1>Mission Control</h1>
        <div class="sub">Live Agent Activity — Sector 7</div>
      </div>
    </div>

    <div class="header-stats" role="status" aria-live="polite">
      <div class="stat-chip green"><span class="lbl">Tasks Done</span><span class="val" id="statTasks">142</span></div>
      <div class="stat-chip cyan"><span class="lbl">Active</span><span class="val" id="statActive">5</span></div>
      <div class="stat-chip amber"><span class="lbl">Queue</span><span class="val" id="statQueue">4</span></div>
      <div class="stat-chip pink"><span class="lbl">Avg RT</span><span class="val" id="statRT">1.2s</span></div>

    <div class="header-actions">

  <!-- MAIN -->
  <main class="main">

    <!-- OPERATIONS FLOOR -->
    <div class="floor-wrap">
      <div class="floor" id="floor">
        <div class="radar-sweep" aria-hidden="true"></div>

        <svg class="paths" viewBox="0 0 1000 600" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <linearGradient id="pathGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#00d9ff" stop-opacity="0.1"/>
            </linearGradient>
          </defs>
          <path class="path-line" d="M 150 130 Q 280 80, 380 110" stroke="url(#pathGrad)" stroke-width="2" fill="none"/>
          <path class="path-line" d="M 460 130 Q 560 80, 700 110" stroke="url(#pathGrad)" stroke-width="2" fill="none"/>
          <path class="path-line" d="M 460 200 Q 500 250, 540 240" stroke="url(#pathGrad)" stroke-width="2" fill="none"/>
          <path class="path-line" d="M 540 240 Q 700 200, 800 130" stroke="url(#pathGrad)" stroke-width="2" fill="none"/>
          <path class="path-line" d="M 800 200 Q 700 280, 540 320" stroke="url(#pathGrad)" stroke-width="2" fill="none"/>
          <path class="path-line" d="M 540 320 Q 400 340, 380 380" stroke="url(#pathGrad)" stroke-width="2" fill="none"/>
          <path class="path-line" d="M 380 380 Q 250 420, 150 460" stroke="url(#pathGrad)" stroke-width="2" fill="none"/>
          <path class="path-line" d="M 540 320 Q 700 360, 800 460" stroke="url(#pathGrad)" stroke-width="2" fill="none"/>
        </svg>

        <div class="zones">
          <div class="zone zone-intake" data-label="◢ Intake" data-zone="intake"></div>
          <div class="zone zone-router" data-label="◈ Router" data-zone="router"></div>
          <div class="zone zone-processor-1" data-label="◇ Processor A" data-zone="procA"></div>
          <div class="zone zone-processor-2" data-label="◇ Processor B" data-zone="procB"></div>
          <div class="zone zone-processor-3" data-label="◇ Processor C" data-zone="procC"></div>
          <div class="zone zone-archive" data-label="◣ Archive" data-zone="archive"></div>
          <div class="zone zone-review" data-label="◉ Review" data-zone="review"></div>
          <div class="zone zone-launch" data-label="▲ Launch" data-zone="launch"></div>
        </div>

        <!-- Stations -->
        <button class="station online" style="top:14%;left:11%" data-station="intake-1" aria-label="Intake station 1">📥</button>
        <button class="station online" style="top:18%;left:18%" data-station="intake-2" aria-label="Intake station 2">📨</button>

        <button class="station processing" style="top:42%;left:38%" data-station="router-1" aria-label="Router station">🔀</button>

        <button class="station busy" style="top:14%;left:38%" data-station="procA-1" aria-label="Processor A station 1">⚙️</button>
        <button class="station online" style="top:18%;left:46%" data-station="procA-2" aria-label="Processor A station 2">⚙️</button>

        <button class="station processing" style="top:14%;right:11%" data-station="procB-1" aria-label="Processor B station 1">🧠</button>
        <button class="station busy" style="top:18%;right:18%" data-station="procB-2" aria-label="Processor B station 2">🧬</button>

        <button class="station idle" style="top:42%;right:11%" data-station="procC-1" aria-label="Processor C station 1">📊</button>
        <button class="station online" style="top:48%;right:18%" data-station="procC-2" aria-label="Processor C station 2">📈</button>

        <button class="station online" style="bottom:14%;right:11%" data-station="archive-1" aria-label="Archive station">💾</button>
        <button class="station idle" style="bottom:18%;right:18%" data-station="archive-2" aria-label="Archive station 2">🗄️</button>

        <button class="station busy" style="bottom:14%;left:38%" data-station="review-1" aria-label="Review station">🔍</button>
        <button class="station online" style="bottom:18%;left:46%" data-station="review-2" aria-label="Review station 2">📋</button>

        <button class="station online" style="bottom:14%;left:11%" data-station="launch-1" aria-label="Launch station">🚀</button>
        <button class="station processing" style="bottom:18%;left:18%" data-station="launch-2" aria-label="Launch station 2">🛰️</button>

        <!-- Packet layer -->
        <div id="packetLayer" style="position:absolute;inset:0;pointer-events:none;z-index:5;"></div>
      </div>

      <!-- Tooltip -->
      <div class="tooltip" id="tooltip" role="tooltip"></div>
    </div>

    <!-- SIDE PANEL -->
    <aside class="side-panel">
      <section class="panel">
        <div class="panel-title">
          <h2>👥 Agent Roster</h2>
          <span class="live-dot" aria-hidden="true"></span>
        </div>
        <div class="agent-list" id="agentList" role="list"></div>
      </section>
    </aside>
  </main>

  <!-- FOOTER LOG -->
  <footer class="footer-log">
    <div class="log-header">
      <h2><span class="live-dot" aria-hidden="true"></span>📡 Live Activity Stream</h2>
      <span style="font-size:9px;color:var(--text-dim);letter-spacing:0.1em;">EVENTS: <span id="logCount">0</span></span>
    </div>
    <div class="log-stream" id="logStream" aria-live="polite"></div>
  </footer>
</div>

<script>
(() => {
  'use strict';

  // ============ STATE ============
  const state = {
    tasksProcessed: 142,
    activeTasks: 5,
    queueLength: 4,
    avgResponseTime: 1.2,
    systemMood: 'Focused',
    dayMode: false,
    emergency: false,
    packets: [],
    agents: [],
    eventCount: 0,
  };

  const moods = ['Focused', 'Busy', 'Calm', 'Energized', 'Processing', 'Heated', 'Steady', 'Alert'];
  const agentNames = ['Nova', 'Echo', 'Pulse', 'Cipher', 'Atlas', 'Lyra', 'Orion', 'Vega', 'Zenith', 'Quark', 'Astra', 'Helix'];
  const agentEmojis = ['🧑‍🚀', '👾', '🤖', '👨‍💻', '🦾', '🧑‍🔬', '🦿', '🧞', '🧚', '🥷', '🦊', '🐉'];
  const agentSpecialties = ['Routing', 'Analysis', 'Translation', 'Synthesis', 'Validation', 'Computation', 'Inspection', 'Dispatch'];
  const taskTypes = ['ANALYZE', 'TRANSLATE', 'VALIDATE', 'AGGREGATE', 'TRANSFORM', 'COMPUTE', 'VERIFY', 'REROUTE'];
  const intakeMessages = [
    'New request from sector {N}',
    'Incoming: batch #{N}',
    'Packet {N} arrived via uplink',
    'Inbound query #{N}',
    'Webhook {N} triggered',
    'Stream {N} opened',
    'Task {N} submitted by user',
  ];
  const processMsgs = [
    'Running heuristics on payload',
    'Tokenizing input stream',
    'Computing vector embeddings',
    'Cross-referencing {N} sources',
    'Validating schema structure',
    'Aggregating results',
    'Applying transformation rules',
  ];
  const archiveMsgs = [
    'Archived to cold storage',
    'Snapshot saved #{N}',
    'Indexed in vault',
    'Committed to history',
  ];
  const reviewMsgs = [
    'Quality check passed',
    'Awaiting sign-off',
    'Reviewing output',
    'Flagged for attention',
  ];
  const launchMsgs = [
    'Deployed to production',
    'Released to client',
    'Broadcast complete',
    'Pushed to network',
  ];
  const errorMsgs = [
    'Timeout — retrying',
    'Rate limit approached',
    'Checksum mismatch',
    'Backpressure detected',
  ];

  // ============ DOM HELPERS ============
  const $ = (id) => document.getElementById(id);
  const floor = $('floor');
  const packetLayer = $('packetLayer');
  const tooltip = $('tooltip');
  const logStream = $('logStream');
  const agentList = $('agentList');

  // ============ STATIONS / ZONES COORDS ============
  // Coordinates are in % of floor; we map packets by interpolation.
  const nodePositions = {
    intake: { x: 14, y: 20 },
    router: { x: 42, y: 47 },
    procA: { x: 42, y: 20 },
    procB: { x: 85, y: 20 },
    procC: { x: 85, y: 48 },
    archive: { x: 85, y: 80 },
    review: { x: 42, y: 80 },
    launch: { x: 14, y: 80 },
  };

  const routes = [
    ['intake', 'router', 'procA'],
    ['intake', 'router', 'procB'],
    ['intake', 'router', 'procC'],
    ['procA', 'review'],
    ['procB', 'review'],
    ['procC', 'review'],
    ['review', 'archive'],
    ['review', 'launch'],
    ['procA', 'archive'],
    ['procB', 'launch'],
  ];

  // ============ CLOCK ============
  function updateClock() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    const ss = String(d.getSeconds()).padStart(2, '0');
    $('clock').textContent = `${hh}:${mm}:${ss}`;
  }

  // ============ AGENTS ============
  const statuses = ['online', 'online', 'online', 'busy', 'busy', 'idle', 'away'];

  function initAgents() {
    const count = 3 + Math.floor(Math.random() * 4); // 3-6
    state.agents = [];
    for (let i = 0; i < count; i++) {
      state.agents.push({
        id: 'A' + (1000 + Math.floor(Math.random() * 9000)),
        name: agentNames[i],
        emoji: agentEmojis[i],
        specialty: agentSpecialties[i % agentSpecialties.length],
        status: statuses[Math.floor(Math.random() * statuses.length)],
        currentTask: null,
        completedToday: Math.floor(Math.random() * 30) + 10,
        avgRT: (0.8 + Math.random() * 0.8).toFixed(2),
      });
    }
    renderAgents();
  }

  function renderAgents() {
    agentList.innerHTML = state.agents.map(a => `
      <div class="agent-row" data-agent="${a.id}" role="listitem" tabindex="0" aria-label="Agent ${a.name}, ${a.status}">
        <div class="agent-avatar">${a.emoji}</div>
        <div class="agent-info">
          <div class="agent-name">${a.name} <span style="color:var(--text-dim);font-weight:400;font-size:9px;">· ${a.id}</span></div>
          <div class="agent-task">${a.currentTask ? '⟶ ' + a.currentTask : a.specialty}</div>
        </div>
        <span class="agent-status ${a.status}">${a.status}</span>
      </div>
    `).join('');

    // Bind events
    agentList.querySelectorAll('.agent-row').forEach(row => {
      const id = row.dataset.agent;
      const showAgent = (e) => showAgentTooltip(e, id);
      row.addEventListener('mouseenter', showAgent);
      row.addEventListener('mouseleave', hideTooltip);
      row.addEventListener('click', showAgent);
      row.addEventListener('focus', showAgent);
    });
  }

  function updateAgentStatuses() {
    state.agents.forEach(a => {
      // Probabilistic state changes
      const r = Math.random();
      if (r < 0.15) {
        const newStatuses = ['online', 'busy', 'idle', 'away'];
        const newStatus = newStatuses[Math.floor(Math.random() * newStatuses.length)];
        if (newStatus !== a.status) {
          a.status = newStatus;
          if (newStatus === 'busy' && !a.currentTask) {
            a.currentTask = 'Task #' + (state.tasksProcessed + Math.floor(Math.random() * 5) + 1);
          } else if (newStatus !== 'busy') {
            a.currentTask = null;
          }
        }
      }
      if (a.status === 'busy' && Math.random() < 0.3) {
        a.completedToday++;
      }
    });
    renderAgents();
  }

  function showAgentTooltip(e, id) {
    const a = state.agents.find(x => x.id === id);
    if (!a) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const wrapRect = floor.parentElement.getBoundingClientRect();
    tooltip.innerHTML = `
      <div class="tooltip-title">${a.emoji} ${a.name} <span style="color:var(--text-dim);font-weight:400;">· ${a.id}</span></div>
      <div class="tooltip-row"><span class="lbl">Specialty</span><span class="val">${a.specialty}</span></div>
      <div class="tooltip-row"><span class="lbl">Status</span><span class="val" style="color:var(--neon-${a.status === 'busy' ? 'amber' : a.status === 'online' ? 'green' : a.status === 'away' ? 'pink' : 'cyan'})">${a.status.toUpperCase()}</span></div>
      <div class="tooltip-row"><span class="lbl">Completed</span><span class="val">${a.completedToday}</span></div>
      <div class="tooltip-row"><span class="lbl">Avg Response</span><span class="val">${a.avgRT}s</span></div>
      ${a.currentTask ? `<div class="tooltip-section"><div class="tooltip-section-title">Current Task</div><div class="tooltip-task"><span class="tid">${a.currentTask}</span><span style="color:var(--neon-amber);">●</span></div></div>` : ''}
    `;
    tooltip.classList.add('show');
    const tw = tooltip.offsetWidth;
    let left = rect.left - wrapRect.left + rect.width + 8;
    if (left + tw > wrapRect.width) left = rect.left - wrapRect.left - tw - 8;
    tooltip.style.left = left + 'px';
    tooltip.style.top = (rect.top - wrapRect.top) + 'px';
  }

  // ============ STATION TOOLTIPS ============
  const stationInfo = {
    'intake-1': { name: 'Intake Station α', tasks: 24, rt: '0.4s' },
    'intake-2': { name: 'Intake Station β', tasks: 19, rt: '0.5s' },
    'router-1': { name: 'Smart Router', tasks: 87, rt: '0.2s' },
    'procA-1': { name: 'Processor A — Analysis', tasks: 56, rt: '1.8s' },
    'procA-2': { name: 'Processor A — Compute', tasks: 42, rt: '2.1s' },
    'procB-1': { name: 'Processor B — Synthesis', tasks: 38, rt: '1.4s' },
    'procB-2': { name: 'Processor B — Transform', tasks: 31, rt: '1.6s' },
    'procC-1': { name: 'Processor C — Aggregation', tasks: 28, rt: '1.1s' },
    'procC-2': { name: 'Processor C — Validation', tasks: 33, rt: '0.9s' },
    'archive-1': { name: 'Cold Archive', tasks: 198, rt: '0.3s' },
    'archive-2': { name: 'Hot Cache', tasks: 76, rt: '0.1s' },
    'review-1': { name: 'Quality Review', tasks: 45, rt: '2.4s' },
    'review-2': { name: 'Approval Queue', tasks: 22, rt: '1.9s' },
    'launch-1': { name: 'Launch Pad', tasks: 67, rt: '0.6s' },
    'launch-2': name: 'Broadcast Tower', tasks: 41, rt: '0.5s' },
  };

  function bindStations() {
    document.querySelectorAll('.station').forEach(st => {
      const id = st.dataset.station;
      const info = stationInfo[id] || { name: id, tasks: 0, rt: '—' };
      const show = (e) => {
        const rect = st.getBoundingClientRect();
        const wrapRect = floor.parentElement.getBoundingClientRect();
        tooltip.innerHTML = `
          <div class="tooltip-title">${st.textContent.trim()} ${info.name}</div>
          <div class="tooltip-row"><span class="lbl">Status</span><span class="val" style="color:var(--neon-${st.classList.contains('busy') ? 'amber' : st.classList.contains('processing') ? 'purple' : st.classList.contains('idle') ? 'dim' : st.classList.contains('away') ? 'pink' : 'green'})">${Array.from(st.classList).find(c => ['online','busy','idle','processing','away'].includes(c)) || 'online'}</span></div>
          <div class="tooltip-row"><span class="lbl">Tasks Today</span><span class="val">${info.tasks}</span></div>
          <div class="tooltip-row"><span class="lbl">Avg Response</span><span class="val">${info.rt}</span></div>
          <div class="tooltip-section"><div class="tooltip-section-title">Click to focus</div><div class="tooltip-task" style="color:var(--text-dim);">Drill into station details</div></div>
        `;
        tooltip.classList.add('show');
        const tw = tooltip.offsetWidth;
        let left = rect.left - wrapRect.left + rect.width / 2 - tw / 2;
        left = Math.max(8, Math.min(left, wrapRect.width - tw - 8));
        let top = rect.top - wrapRect.top - tooltip.offsetHeight - 8;
        if (top < 8) top = rect.bottom - wrapRect.top + 8;
        tooltip.style.left = left + 'px';
        tooltip.style.top = top + 'px';
      };
      st.addEventListener('mouseenter', show);
      st.addEventListener('mouseleave', hideTooltip);
      st.addEventListener('click', show);
      st.addEventListener('focus', show);
    });

    document.querySelectorAll('.zone').forEach(z => {
      const name = z.dataset.label;
      const show = (e) => {
        const rect = z.getBoundingClientRect();
        const wrapRect = floor.parentElement.getBoundingClientRect();
        tooltip.innerHTML = `
          <div class="tooltip-title">${name}</div>
          <div class="tooltip-row"><span class="lbl">Zone Type</span><span class="val">${z.dataset.zone}</span></div>
          <div class="tooltip-row"><span class="lbl">Stations</span><span class="val">2</span></div>
          <div class="tooltip-row"><span class="lbl">Throughput</span><span class="val">${Math.floor(Math.random()*50+20)}/min</span></div>
        `;
        tooltip.classList.add('show');
        const tw = tooltip.offsetWidth;
        let left = rect.left - wrapRect.left + rect.width / 2 - tw / 2;
        left = Math.max(8, Math.min(left, wrapRect.width - tw - 8));
        tooltip.style.left = left + 'px';
        tooltip.style.top = (rect.bottom - wrapRect.top + 6) + 'px';
      };
      z.addEventListener('mouseenter', show);
      z.addEventListener('mouseleave', hideTooltip);
    });
  }

  function hideTooltip() {
    tooltip.classList.remove('show');
  }

  // ============ PACKETS ============
  function spawnPacket(opts = {}) {
    const urgent = opts.urgent || Math.random() < 0.18;
    const priority = !urgent && Math.random() < 0.3;
    const packet = document.createElement('div');
    packet.className = 'packet' + (urgent ? ' urgent' : priority ? ' priority' : '');
    packet.innerHTML = '<div class="packet-inner"></div>';
    packetLayer.appendChild(packet);

    const taskId = 'T' + (state.tasksProcessed + Math.floor(Math.random() * 100) + 1);
    const route = routes[Math.floor(Math.random() * routes.length)];
    const p = {
      el: packet,
      taskId,
      route,
      idx: 0,
      progress: 0,
      speed: 0.005 + Math.random() * 0.008,
      urgent,
    };

    movePacket(p);
    state.packets.push(p);
    addLog(intakeMessages[Math.floor(Math.random()*intakeMessages.length)].replace('{N}', taskId), 'intake', taskId);

    if (state.agents.some(a => a.status === 'idle')) {
      const idle = state.agents.find(a => a.status === 'idle');
      idle.status = 'busy';
      idle.currentTask = taskId;
    }
  }

  function movePacket(p) {
    const from = nodePositions[p.route[p.idx]];
    const to = nodePositions[p.route[p.idx + 1]];
    if (!from || !to) return finishPacket(p);

    const x = from.x + (to.x - from.x) * p.progress;
    const y = from.y + (to.y - from.y) * p.progress;
    p.el.style.left = x + '%';
    p.el.style.top = y + '%';

    p.progress += p.speed;
    if (p.progress >= 1) {
      p.progress = 0;
      p.idx++;
      onArriveAtNode(p, p.route[p.idx - 1], p.route[p.idx]);
    }
    requestAnimationFrame(() => movePacket(p));
  }

  function onArriveAtNode(p, from, to) {
    const msgFor = {
      router: ['Routing to ' + (to === 'procA' ? 'Processor A' : to === 'procB' ? 'Processor B' : 'Processor C')],
      procA: [processMsgs[Math.floor(Math.random()*processMsgs.length)].replace('{N}', '4')],
      procB: [processMsgs[Math.floor(Math.random()*processMsgs.length)].replace('{N}', '3')],
      procC: [processMsgs[Math.floor(Math.random()*processMsgs.length)].replace('{N}', '5')],
      review: [reviewMsgs[Math.floor(Math.random()*reviewMsgs.length)]],
      archive: [archiveMsgs[Math.floor(Math.random()*archiveMsgs.length)].replace('{N}', p.taskId)],
      launch: [launchMsgs[Math.floor(Math.random()*launchMsgs.length)]],
    };
    const tagFor = {
      router: 'route', procA: 'process', procB: 'process', procC: 'process',
      review: 'review', archive: 'archive', launch: 'launch',
    };
    const msgs = msgFor[to] || ['Processing'];
    if (msgs) addLog(msgs[Math.floor(Math.random()*msgs.length)], tagFor[to] || 'process', p.taskId);
  }

  function finishPacket(p) {
    p.el.style.opacity = '0';
    p.el.style.transform = 'translate(-50%, -50%) scale(2)';
    p.el.style.transition = 'all 0.4s';
    setTimeout(() => p.el.remove(), 400);
    state.packets = state.packets.filter(x => x !== p);
    state.tasksProcessed++;
    state.activeTasks = Math.max(1, state.activeTasks - 1 + (Math.random() < 0.3 ? 1 : 0));
  }

  // ============ LOG ============
  function addLog(msg, tag, ref) {
    const d = new Date();
    const time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `
      <span class="log-time">${time}</span>
      <span class="log-tag ${tag}">${tag}</span>
      <span class="log-msg">${msg}${ref ? ' <span class="ref">[' + ref + ']</span>' : ''}</span>
    `;
    logStream.insertBefore(entry, logStream.firstChild);
    state.eventCount++;
    $('logCount').textContent = state.eventCount;
    while (logStream.children.length > 80) logStream.removeChild(logStream.lastChild);
  }

  // ============ STATS UPDATER ============
  function updateStats() {
    if (Math.random() < 0.7) state.tasksProcessed += Math.floor(Math.random() * 3);
    state.activeTasks = Math.max(2, Math.min(8, state.activeTasks + (Math.random() < 0.5 ? -1 : 1)));
    state.queueLength = Math.max(0, Math.min(12, state.queueLength + (Math.random() < 0.5 ? -1 : 1)));
    state.avgResponseTime = Math.max(0.6, Math.min(3.5, state.avgResponseTime + (Math.random() - 0.5) * 0.2));
    if (Math.random() < 0.2) state.systemMood = moods[Math.floor(Math.random() * moods.length)];

    $('statTasks').textContent = state.tasksProcessed;
    $('statActive').textContent = state.activeTasks;
    $('statQueue').textContent = state.queueLength;
    $('statRT').textContent = state.avgResponseTime.toFixed(1) + 's';
  }

  // ============ AMBIENT ACTIVITY ============
  function ambientTick() {
    if (Math.random() < 0.6) spawnPacket();
    if (Math.random() < 0.3) {
      const tags = ['route', 'process', 'archive', 'review', 'launch'];
      const tag = tags[Math.floor(Math.random()*tags.length)];
      const allMsgs = { route: processMsgs, process: processMsgs, archive: archiveMsgs, review: reviewMsgs, launch: launchMsgs };
      const pool = allMsgs[tag] || processMsgs;
      addLog(pool[Math.floor(Math.random()*pool.length)].replace('{N}', Math.floor(Math.random()*999)), tag);
    }
    if (Math.random() < 0.05) addLog(errorMsgs[Math.floor(Math.random()*errorMsgs.length)], 'error');
  }

  // ============ MODE TOGGLES ============
  $('btnMode').addEventListener('click', () => {
    state.dayMode = !state.dayMode;
    document.body.classList.toggle('day-mode', state.dayMode);
    $('btnMode').textContent = state.dayMode ? '☀ Day' : '☾ Night';
    addLog(state.dayMode ? 'Shift changed: Day mode active' : 'Shift changed: Night mode active', 'route');
  });

  $('btnAlert').addEventListener('click', () => {
    state.emergency = !state.emergency;
    document.body.classList.toggle('emergency', state.emergency);
    $('btnAlert').textContent = state.emergency ? '🚨 Emergency' : '⚠ Normal';
    addLog(state.emergency ? '⚠ EMERGENCY PROTOCOL ENGAGED' : '✓ Emergency protocol lifted', state.emergency ? 'error' : 'route');
  });

  $('btnSpawn').addEventListener('click', () => {
    spawnPacket({ urgent: true });
  });

  // ============ STATION CLASSES UPDATE ============
  function refreshStationStates() {
    const stations = document.querySelectorAll('.station');
    stations.forEach(s => {
      // Sometimes toggle the state class for visual variety
      if (Math.random() < 0.15) {
        const states = ['online', 'busy', 'idle', 'processing'];
        const newState = states[Math.floor(Math.random() * states.length)];
        s.classList.remove('online', 'busy', 'idle', 'processing', 'away');
        s.classList.add(newState);
      }
    });
  }

  // ============ STARTUP ============
  function init() {
    initAgents();
    bindStations();
    updateClock();
    setInterval(updateClock, 1000);
    setInterval(updateStats, 1500);
    setInterval(updateAgentStatuses, 2500);
    setInterval(ambientTick, 2200);
    setInterval(refreshStationStates, 3500);

    // Seed log
    addLog('Mission Control online — Sector 7 nominal', 'route');
    addLog('All stations reporting green', 'launch');

    // Initial packets
    setTimeout(() => spawnPacket(), 400);
    setTimeout(() => spawnPacket(), 900);
    setTimeout(() => spawnPacket(), 1500);

    // Hide tooltip on any click outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.station') && !e.target.closest('.zone') && !e.target.closest('.agent-row')) {
        hideTooltip();
      }
    });

    // Resize handler — keep packet positions relative (they use %)
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
